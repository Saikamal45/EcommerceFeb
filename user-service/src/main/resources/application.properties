spring.application.name=user-service
spring.config.import=optional:configserver:http://localhost:8087
#Actuator EndPoints

management.endpoint.circuitbreakers.enabled=true
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*
management.endpoint.ratelimiters.enabled=true
management.info.env.enabled=true

info.app.name=User Service
info.app.version=1.0.0
info.app.owner=Sai Kamal
info.app.description=Ecommerce App
logging.level.io.github.resilience4j.ratelimiter=DEBUG

#RateLimiter
resilience4j.ratelimiter.instances.userServiceLimiter.limitForPeriod=2
resilience4j.ratelimiter.instances.userServiceLimiter.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.userServiceLimiter.timeoutDuration=0